kind = "web"
previewPath = "/"
title = "Production Tracker"
version = "1.0.0"
id = "artifacts/production-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/production-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/production-tracker", "run", "build" ]
publicDir = "artifacts/production-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
